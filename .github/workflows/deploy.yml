name: Deploy Eater Platformer

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Deploy Branch
        env:
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_COMMIT_SHA: ${{ github.sha }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Fetch all branches to ensure we can switch
          git fetch origin
          
          # Check out deploy branch, create it if it doesn't exist
          if git show-ref --quiet refs/remotes/origin/deploy; then
            git checkout deploy
            git reset --hard origin/master
          else
            git checkout -b deploy
          fi
          
          # Replace image tag in docker-compose.yml using env variables to prevent injection
          IMAGE_NAME="ghcr.io/${GITHUB_REPO_OWNER}/${GITHUB_REPO_NAME}"
          sed -i "s|image: ${IMAGE_NAME}:latest|image: ${IMAGE_NAME}:${GITHUB_COMMIT_SHA}|g" docker-compose.yml
          
          git add docker-compose.yml
          git commit -m "deploy: update image to tag ${GITHUB_COMMIT_SHA}" || echo "No changes to commit"
          git push origin deploy --force

      - name: Trigger Portainer Redeploy Webhooks
        env:
          HOOKS: ${{ secrets.PORTAINER_REDEPLOY_HOOK }}
        run: |
          pids=()
          idx=0
          while IFS= read -r url; do
            [[ -z "$url" ]] && continue
            idx=$((idx+1))
            echo "Triggering hook #${idx}..."
            curl -s -w "\n[HTTP %{http_code}]\n" -X POST "$url" &
            pids+=($!)
          done <<< "$HOOKS"
          echo "Total hooks triggered: ${#pids[@]}"
          for pid in "${pids[@]}"; do
            wait "$pid" || echo "Hook PID $pid exited with error"
          done

